# Root Next app (anuva.blog) → SiteGround folder anuva.blog/public_html/
# Requires GitHub secrets: SITEGROUND_FTP_SERVER, SITEGROUND_FTP_USERNAME, SITEGROUND_FTP_PASSWORD
# (Production aegis-labs.pro is built from the sibling repo `aegis-labs-site` — its own GitHub Actions + AEGIS_FTP_PASSWORD.)
name: Build & Deploy anuva.blog (SiteGround)

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "components/**"
      - "content/**"
      - "lib/**"
      - "public/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - "postcss.config.mjs"
      - "eslint.config.mjs"
      - "tsconfig.json"
      - "mdx-components.tsx"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to SiteGround via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SITEGROUND_FTP_SERVER }}
          username: ${{ secrets.SITEGROUND_FTP_USERNAME }}
          password: ${{ secrets.SITEGROUND_FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: anuva.blog/public_html/
          protocol: ftps
          port: 21
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
